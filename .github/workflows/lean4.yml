name: Suzuki Method Verification

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup and Build Suzuki Framework
      run: |
        # 1. elanのインストール（対話なし）
        curl https://elan.lean-lang.org/elanself-update -sSf | sh -s -- -y --default-toolchain none
        
        # 2. パスをこの実行セッションに強制反映
        source $HOME/.elan/env
        export PATH="$HOME/.elan/bin:$PATH"
        
        # 3. 動作確認
        elan --version
        
        # 4. ビルド実行
        # ルートに lakefile.lean があることを前提に動きます
        lake update
        lake build SuzukiRH
