name: Suzuki Method Verification
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lean 4
        uses: leanprover/lean-action@v1
        with:
          # ここで update を行わない設定
          build-args: "" 

      - name: Final Build
        run: |
          # update をスキップし、現在の lakefile.lean に基づきビルド
          lake build SuzukiRH
