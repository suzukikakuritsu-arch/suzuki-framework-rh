name: Suzuki Method Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install elan (Lean 4 Version Manager)
      run: |
        set -e
        curl https://elan.lean-lang.org/elanself-update -sSf | sh -s -- -y --default-toolchain none
        # elanのバイナリへのパスをGitHubのPATHに追加
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Lake Update and Build
      run: |
        # 明示的にパスを指定して実行することで "command not found" を防ぐ
        export PATH="$HOME/.elan/bin:$PATH"
        
        # ツールチェーンの確認
        elan --version
        
        # プロジェクトのビルド
        lake update
        lake build SuzukiRH
