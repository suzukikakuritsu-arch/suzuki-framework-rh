name: Suzuki Method Verification

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # curlを使わず、公式のアクションでLeanをセットアップ
      - name: Install Lean 4 (Official Action)
        uses: leanprover/lean-action@v1
        with:
          # ここでビルドまで一気に行います
          test: false 

      - name: Suzuki Method Build
        run: |
          # 公式アクションによってPATHは既に通っています
          lake update
          lake build SuzukiRH
