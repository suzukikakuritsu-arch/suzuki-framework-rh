name: Suzuki Method Verification

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install elan
      run: |
        curl https://elan.lean-lang.org/elanself-update -sSf | sh -s -- -y --default-toolchain none
        # ここで elan のバイナリパスを GitHub の環境変数に追加
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Build and Verify
      run: |
        # パスが反映されるように一度シェルを介して実行
        source $HOME/.elan/env
        lake update
        lake build SuzukiRH
