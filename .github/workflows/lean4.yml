name: Lean 4 CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lean toolchain
        uses: leanprover/lean-action@v1

      - name: Update dependencies
        run: lake update

      - name: Build SuzukiRH
        run: lake build SuzukiRH
